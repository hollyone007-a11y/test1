<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.55" stop-color="#0b1018"/>
      <stop offset="1" stop-color="#07130f"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#46f2b2"/>
      <stop offset="1" stop-color="#15b884"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#61a8ff"/>
      <stop offset="1" stop-color="#2868d8"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd36b"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a8a"/>
      <stop offset="1" stop-color="#e43f5a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font-family: Manrope, Inter, Arial, sans-serif; font-size: 54px; font-weight: 900; fill: #f4f7fb; letter-spacing: 0; }
      .sub { font-family: Manrope, Inter, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #9da8b7; letter-spacing: 0; }
      .card { fill: #10151f; stroke: #253044; stroke-width: 2; filter: url(#shadow); }
      .label { font-family: Manrope, Inter, Arial, sans-serif; font-size: 28px; font-weight: 900; fill: #ffffff; letter-spacing: 0; }
      .small { font-family: Manrope, Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #9da8b7; letter-spacing: 0; }
      .mono { font-family: "JetBrains Mono", Consolas, monospace; font-size: 48px; font-weight: 900; fill: #06100b; letter-spacing: 0; }
      .badge { font-family: "JetBrains Mono", Consolas, monospace; font-size: 18px; font-weight: 900; fill: #34d399; letter-spacing: 0; }
      .stroke { fill: none; stroke: #06100b; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>
  <circle cx="250" cy="120" r="160" fill="#20d495" opacity="0.08"/>
  <circle cx="1190" cy="850" r="220" fill="#3b82f6" opacity="0.07"/>

  <text x="92" y="96" class="title">New app name + icon directions</text>
  <text x="94" y="136" class="sub">Dark mobile-first style for construction, Rohlik hours, payroll and admin control</text>

  <g transform="translate(90 200)">
    <rect class="card" width="240" height="300" rx="32"/>
    <rect x="44" y="34" width="152" height="152" rx="38" fill="url(#green)"/>
    <path class="stroke" d="M84 128h72M96 128V88h48v40M108 88V70h24v18"/>
    <path class="stroke" d="M84 78h72"/>
    <text x="120" y="134" text-anchor="middle" class="mono" font-size="34">B</text>
    <text x="28" y="226" class="label">BuildPay</text>
    <text x="28" y="258" class="small">construction + salary</text>
    <text x="28" y="284" class="badge">RECOMMENDED</text>
  </g>

  <g transform="translate(350 200)">
    <rect class="card" width="240" height="300" rx="32"/>
    <rect x="44" y="34" width="152" height="152" rx="38" fill="url(#blue)"/>
    <path class="stroke" d="M120 72c-24 0-42 18-42 41 0 31 42 63 42 63s42-32 42-63c0-23-18-41-42-41z"/>
    <circle cx="120" cy="112" r="14" fill="#06100b"/>
    <path class="stroke" d="M92 156h56"/>
    <text x="28" y="226" class="label">WorkPoint</text>
    <text x="28" y="258" class="small">people, objects, GPS</text>
    <text x="28" y="284" class="badge">CLEAR</text>
  </g>

  <g transform="translate(610 200)">
    <rect class="card" width="240" height="300" rx="32"/>
    <rect x="44" y="34" width="152" height="152" rx="38" fill="url(#yellow)"/>
    <path class="stroke" d="M78 128h26l14-42 22 78 16-36h28"/>
    <circle cx="120" cy="110" r="58" fill="none" stroke="#06100b" stroke-width="10"/>
    <text x="28" y="226" class="label">CrewPulse</text>
    <text x="28" y="258" class="small">live timer + activity</text>
    <text x="28" y="284" class="badge">ENERGETIC</text>
  </g>

  <g transform="translate(870 200)">
    <rect class="card" width="240" height="300" rx="32"/>
    <rect x="44" y="34" width="152" height="152" rx="38" fill="url(#green)"/>
    <path class="stroke" d="M82 142V96l38-24 38 24v46"/>
    <path class="stroke" d="M101 142v-26h38v26"/>
    <path class="stroke" d="M74 82h92"/>
    <path class="stroke" d="M158 82v-22"/>
    <text x="28" y="226" class="label">StavbaFlow</text>
    <text x="28" y="258" class="small">best for builders</text>
    <text x="28" y="284" class="badge">FIELD</text>
  </g>

  <g transform="translate(1130 200)">
    <rect class="card" width="240" height="300" rx="32"/>
    <rect x="44" y="34" width="152" height="152" rx="38" fill="url(#red)"/>
    <path class="stroke" d="M84 78h72v92H84z"/>
    <path class="stroke" d="M102 58v36M138 58v36M98 118h44M98 146h28"/>
    <path class="stroke" d="M146 150l14 14 24-34"/>
    <text x="28" y="226" class="label">ShiftLedger</text>
    <text x="28" y="258" class="small">hours + accounting</text>
    <text x="28" y="284" class="badge">ADMIN</text>
  </g>

  <g transform="translate(90 570)">
    <rect class="card" width="1280" height="280" rx="34"/>
    <text x="48" y="70" class="label">My naming recommendation</text>
    <text x="48" y="115" class="sub">BuildPay is short, works in Czech/Russian/Ukrainian context, and directly says what the app controls: work + money.</text>
    <text x="48" y="165" class="sub">If we want the strongest construction focus, choose StavbaFlow. If we want a neutral name for Rohlik + construction + admin, choose WorkPoint.</text>
    <rect x="48" y="205" width="220" height="48" rx="18" fill="#14221d" stroke="#2b8f6d"/>
    <text x="76" y="237" class="badge">A: BuildPay</text>
    <rect x="292" y="205" width="240" height="48" rx="18" fill="#121c2b" stroke="#315f9e"/>
    <text x="320" y="237" class="badge">B: WorkPoint</text>
    <rect x="556" y="205" width="250" height="48" rx="18" fill="#20190e" stroke="#a97712"/>
    <text x="584" y="237" class="badge">C: CrewPulse</text>
    <rect x="830" y="205" width="260" height="48" rx="18" fill="#14221d" stroke="#2b8f6d"/>
    <text x="858" y="237" class="badge">D: StavbaFlow</text>
    <rect x="1114" y="205" width="140" height="48" rx="18" fill="#28151b" stroke="#a13a52"/>
    <text x="1142" y="237" class="badge">E: Shift</text>
  </g>
</svg>
