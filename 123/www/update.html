<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BuildPay - aktualizace</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#07090d;color:#f4f6f8;font:16px system-ui,sans-serif}
    main{width:min(420px,calc(100dvw - 32px));padding:24px;border:1px solid #253041;border-radius:8px;background:#10141b}
    strong{display:block;font-size:24px;margin-bottom:8px}
    p{color:#9aa3ad;line-height:1.5}
  </style>
</head>
<body>
  <main>
    <strong>BuildPay se aktualizuje</strong>
    <p>Mažu starou verzi aplikace z telefonu nebo notebooku. Za chvili se otevře aktualni verze.</p>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } catch (err) {
        console.warn(err);
      }
      location.replace('/?fresh=' + Date.now());
    })();
  </script>
</body>
</html>
